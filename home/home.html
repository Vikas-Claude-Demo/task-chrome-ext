<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nudge | Smart Follow-Up CRM for LinkedIn, Gmail, Outlook and WhatsApp</title>
  <meta name="description" content="Nudge helps you save follow-up tasks from LinkedIn, Gmail, Outlook and WhatsApp, then reminds you at the right time so no conversation goes cold." />
  <meta name="keywords" content="Nudge, follow up CRM, LinkedIn follow up, Gmail follow up, Chrome extension CRM, sales follow up reminders" />
  <meta name="author" content="Nudge" />
  <meta name="robots" content="index, follow" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nudge | Smart Follow-Up CRM for Modern Teams" />
  <meta property="og:description" content="Capture follow-ups from LinkedIn, Gmail, Outlook and WhatsApp in one click. Stay organized with reminders, owners, stages and timeline tracking." />
  <meta property="og:site_name" content="Nudge" />
  <meta property="og:image" content="../icons/icon128.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nudge | Smart Follow-Up CRM for Modern Teams" />
  <meta name="twitter:description" content="Save follow-up tasks from your inbox and chats, then track reminders and stages in one dashboard." />
  <meta name="twitter:image" content="../icons/icon128.png" />

  <link rel="icon" type="image/png" href="../icons/icon48.png" />
  <link rel="apple-touch-icon" href="../icons/icon128.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="home.css" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Nudge",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Chrome",
      "description": "A Chrome extension to capture follow-up tasks from LinkedIn, Gmail, Outlook and WhatsApp with reminders and CRM stages.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
</head>
<body>
  <main class="home-layout">
    <section class="auth-panel">
      <div class="auth-panel__inner">
        <h1 class="auth-title">Nudge</h1>
        <p id="auth-subtitle" class="auth-subtitle">One tap. Back in the conversation</p>

        <form id="auth-form" class="auth-form" novalidate>
          <input id="auth-name" type="text" class="auth-input" placeholder="Full Name" autocomplete="name" hidden />
          <input id="auth-email" type="email" class="auth-input" placeholder="Email" autocomplete="email" required />
          <input id="auth-password" type="password" class="auth-input" placeholder="Password" autocomplete="current-password" required />
          <button id="auth-forgot-btn" type="button" class="auth-forgot-btn">Forgot password?</button>
          <input id="auth-teamcode" type="text" class="auth-input" placeholder="Team Code (optional — leave blank to create new team)" autocomplete="off" maxlength="8" hidden />
          <p id="auth-error" class="auth-error" hidden></p>
          <button id="auth-submit" type="submit" class="auth-submit">Sign In</button>
        </form>

        <p class="auth-switch">
          <span id="auth-switch-text">Don't have an account?</span>
          <button type="button" id="auth-switch-btn" class="auth-switch-btn">Sign Up</button>
        </p>

          <!-- <div class="auth-divider"><span>OR</span></div>
          <button id="guest-btn" type="button" class="guest-btn">Continue as Guest</button> -->
      </div>
    </section>

    <section class="visual-panel">
      <div class="visual-card">
        <img id="rotating-image" src="../icons/icon128.png" alt="Nudge preview" />
      </div>
    </section>
  </main>

  <script src="../shared/config.js"></script>
  <script src="../shared/firebase-storage.js"></script>
  <script src="home.js"></script>
</body>
</html>
